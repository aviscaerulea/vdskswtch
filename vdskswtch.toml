# vim: set ft=toml fenc=utf-8 ff=unix sw=4 ts=4 et :
##################################################
# vdskswtch 設定ファイル
##################################################

# switch 前に実行するコマンド一覧（任意）
# デスクトップ切り替え前に実行される。前のコマンドの完了を待ってから次を実行する。
# 実行に失敗してもデスクトップ切り替えは続行され、失敗内容は stderr に出力される。
# コマンドがハングした場合、vdskswtch.exe も完了を待ち続ける点に注意する。
# デフォルト：空配列（何も実行しない）
# 例: pre_exec = ["C:\\scripts\\pre-meeting.bat"]
pre_exec = []

# switch 後に実行するコマンド一覧（任意）
# デスクトップ切り替え後に実行される
# デフォルト：空配列（何も実行しない）
# 例: post_exec = ["C:\\scripts\\start-meeting.bat"]
post_exec = []

# 全仮想デスクトップにピン留めするプロセス名一覧（任意）
# switch 後、デスクトップ切り替え完了後に指定プロセスのウィンドウをピン留めする。
# 実行ファイル名（大文字小文字不問）で指定する。ピン留めされたウィンドウはすべての仮想デスクトップに表示される。
# ウィンドウが存在しない場合や既にピン留め済みの場合は何もしない。
# 注意：ウィンドウ単位でピン留めするため、アプリを再起動すると新しいウィンドウはピン留めが解除される。
# デフォルト：空配列（何もピン留めしない）
# 例: pin_apps = ["Teams.exe", "Zoom.exe"]
pin_apps = []

# close 時に実行するコマンド一覧（任意）
# デスクトップ削除前に実行される。対象デスクトップが存在しない場合は実行されない。
# close_exec の完了後にデスクトップ削除を試みる。削除に失敗した場合でも
# close_exec は実行済みのためロールバックされない点に注意する。
# デフォルト：空配列（何も実行しない）
# 例: close_exec = ["C:\\scripts\\end-meeting.bat"]
close_exec = []
