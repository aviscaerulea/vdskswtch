# vim: set ft=yaml fenc=utf-8 ff=unix sw=2 ts=2 et :
$schema: https://taskfile.dev/schema.json
version: '3'

vars:
  APP_NAME: vdskswtch
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null | sed 's/^v//' | grep -m1 . || echo "dev"
  ARCH: x64

tasks:
  default:
    desc: クリーンビルドを実行する
    cmds:
      - task: clean
      - task: build

  clean:
    desc: out/ 以下のファイルを削除
    cmds:
      - cmd: pwsh.exe -NoProfile -Command "if (Test-Path out) { Remove-Item -Recurse -Force out }"

  build:
    desc: デバッグビルド（out/vdskswtch.exe）
    cmds:
      - cmd: pwsh.exe -NoProfile -File build.ps1 -Version "{{.VERSION}}" -Config Debug

  release:
    desc: リリースビルド + zip パッケージング
    deps: [clean]
    cmds:
      - cmd: pwsh.exe -NoProfile -File build.ps1 -Version "{{.VERSION}}" -Config Release
      - cmd: pwsh.exe -NoProfile -Command "Compress-Archive -Path 'out/{{.APP_NAME}}.exe' -DestinationPath 'out/{{.APP_NAME}}-v{{.VERSION}}-{{.ARCH}}.zip' -Force"
      - cmd: echo "Package out/{{.APP_NAME}}-v{{.VERSION}}-{{.ARCH}}.zip"

  run:
    desc: 引数なしで実行（switch Meeting）
    deps: [build]
    cmds:
      - ./out/{{.APP_NAME}}.exe
